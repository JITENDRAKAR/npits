{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block content %}
<div class="row justify-content-center py-5">
    <div class="col-md-5 col-lg-4">
        <div class="card shadow-sm border-0 rounded-4">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <div class="d-inline-flex align-items-center justify-content-center bg-primary text-white rounded-circle mb-3"
                        style="width: 64px; height: 64px;">
                        <i class="fas fa-key fa-lg"></i>
                    </div>
                    <h3 class="fw-bold">Forgot Password</h3>
                    <p class="text-muted small">Enter your email and we'll send you a 6-digit code to reset your password.</p>
                </div>

                <form method="post">
                    {% csrf_token %}
                    {{ form|crispy }}
                    <button type="submit" class="btn btn-primary w-100 py-2 fw-bold shadow-sm mt-3">
                        Send Code <i class="fas fa-paper-plane ms-2"></i>
                    </button>
                </form>

                <div class="text-center mt-4 pt-3 border-top">
                    <p class="small text-muted mb-0">Remembered your password? <a href="{% url 'login' %}"
                            class="fw-bold text-decoration-none">Login</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
