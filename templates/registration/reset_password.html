{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block content %}
<div class="row justify-content-center py-5">
    <div class="col-md-5 col-lg-4">
        <div class="card shadow-sm border-0 rounded-4">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <div class="d-inline-flex align-items-center justify-content-center bg-primary text-white rounded-circle mb-3"
                        style="width: 64px; height: 64px;">
                        <i class="fas fa-lock-open fa-lg"></i>
                    </div>
                    <h3 class="fw-bold">Reset Password</h3>
                    <p class="text-muted small">Enter your new password below.</p>
                </div>

                <form method="post">
                    {% csrf_token %}
                    {{ form|crispy }}
                    <button type="submit" class="btn btn-primary w-100 py-2 fw-bold shadow-sm mt-3">
                        Reset Password <i class="fas fa-save ms-2"></i>
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
